name = "nh-tool"
main = "worker/index.js"
compatibility_date = "2026-05-26"

[assets]
  not_found_handling = "single-page-application"

[observability]
  enabled = true

upload_source_maps = true
compatibility_flags = ["nodejs_compat"]

# NOTE: [vars] are generated from `.env` by `npm run build` / `npm run deploy`.
# For secure deployment, do not commit secrets into wrangler.toml.